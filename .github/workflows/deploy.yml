name: 🚀 FTP Deployment

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          
      - name: 📦 Install Dependencies
        run: composer install --no-dev --classmap-authoritative
      
      - name: 📂 List files
        run: ls -R
      
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          security: loose
          protocol: ftp
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*/**
            **/node_modules/**
            **/.env*
            **/README.md
            **/DEPLOYMENT.md
            **/FTP-UPLOAD.md
            **/GITHUB-ACTIONS-SETUP.md
            **/IMPORT-TALIMATLARI.md
            **/ADMIN-BILGILERI.md
            **/KONTROL_LISTESI.md
            **/database/schema.sql
            **/tests/**
            **/.vscode/**
            **/.idea/**
            **/*.log
            **/*.tmp
            **/*.sql
            **/*.sql.gz
            **/*.sql.bak
